<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조합전용몰 관리</title>

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />

  <script src="/assets/js/partials.js" defer></script>
  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/header-auth.js"></script>

  <style>
    .ac-section { background: var(--surface,#fff); border: 1px solid var(--border,#e5e7eb); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
    .ac-section-title { font-weight: 700; font-size: 1rem; margin-bottom: 14px; }
    .ac-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .ac-label { font-size: 0.85rem; color: var(--muted,#6b7280); min-width: 80px; }
    .ac-input { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; flex: 1; min-width: 120px; }
    .ac-input:focus { outline: none; border-color: var(--accent,#7c3aed); }
    .ac-btn { padding: 8px 18px; border: none; border-radius: 7px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
    .ac-btn-primary { background: var(--accent,#7c3aed); color: #fff; }
    .ac-btn-primary:hover { background: #6d28d9; }
    .ac-btn-danger { background: #ef4444; color: #fff; }
    .ac-btn-danger:hover { background: #dc2626; }
    .ac-btn-ghost { background: transparent; border: 1px solid var(--border,#e5e7eb); color: var(--text,#111); }
    .ac-btn-ghost:hover { background: var(--surface2,#f3f4f6); }
    .ac-status { font-size: 0.82rem; margin-top: 6px; color: var(--muted,#6b7280); min-height: 18px; }
    .ac-status.err { color: #e53e3e; }
    .ac-status.ok  { color: #16a34a; }

    /* 상품 테이블 */
    .ac-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .ac-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border,#e5e7eb); color: var(--muted,#6b7280); font-weight: 600; }
    .ac-table td { padding: 10px 10px; border-bottom: 1px solid var(--border,#e5e7eb); vertical-align: middle; }
    .ac-table tr:last-child td { border-bottom: none; }
    .ac-thumb { width: 52px; height: 40px; object-fit: cover; border-radius: 5px; background: #f3f4f6; display: block; }
    .ac-badge-on  { background: #d1fae5; color: #065f46; border-radius: 99px; padding: 2px 8px; font-size: 0.75rem; font-weight: 600; }
    .ac-badge-off { background: #fee2e2; color: #991b1b; border-radius: 99px; padding: 2px 8px; font-size: 0.75rem; font-weight: 600; }

    /* 폼 */
    .ac-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 560px) { .ac-form-grid { grid-template-columns: 1fr; } }
    .ac-form-field { display: flex; flex-direction: column; gap: 4px; }
    .ac-form-field label { font-size: 0.82rem; color: var(--muted,#6b7280); font-weight: 600; }
    .ac-form-field input, .ac-form-field textarea { padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.88rem; }
    .ac-form-field input:focus, .ac-form-field textarea:focus { outline: none; border-color: var(--accent,#7c3aed); }
    .ac-form-field textarea { resize: vertical; min-height: 72px; }
    .ac-form-full { grid-column: 1 / -1; }
    .ac-form-actions { grid-column: 1 / -1; display: flex; gap: 8px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="siteHeader"></div>

  <main class="page">
    <section class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">조합전용몰 관리</h1>
      </div>
    </section>

    <div id="adminContent" style="display:none;">

      <!-- 설정 -->
      <section class="section">
        <div class="ac-section">
          <div class="ac-section-title">입장 기준 설정</div>
          <div class="ac-row">
            <span class="ac-label">최소 스테이킹</span>
            <input type="number" id="inputMinStake" class="ac-input" min="0" step="1000" placeholder="예: 10000" style="max-width:160px;" />
            <span class="ac-label" style="font-size:0.8rem; color:#888;">JUMP</span>
            <button class="ac-btn ac-btn-primary" id="btnSaveConfig" type="button">저장</button>
          </div>
          <div class="ac-status" id="configStatus"></div>
        </div>
      </section>

      <!-- 상품 등록 폼 -->
      <section class="section">
        <div class="ac-section">
          <div class="ac-section-title" id="formTitle">상품 등록</div>
          <input type="hidden" id="editProductId" value="" />
          <div class="ac-form-grid">
            <div class="ac-form-field ac-form-full">
              <label>상품 유형 *</label>
              <div style="display:flex;gap:20px;margin-top:4px;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;font-weight:400;">
                  <input type="radio" name="productType" id="typeGeneral" value="general" checked /> 일반상품
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;font-weight:400;">
                  <input type="radio" name="productType" id="typeVoucher" value="voucher" /> 바우처
                </label>
              </div>
            </div>
            <div class="ac-form-field">
              <label>상품명 *</label>
              <input type="text" id="inputName" placeholder="상품명" />
            </div>
            <div class="ac-form-field">
              <label>KRW 가격 *</label>
              <input type="number" id="inputPrice" placeholder="예: 50000" min="1" step="1000" />
            </div>
            <div class="ac-form-field ac-form-full">
              <label>설명</label>
              <textarea id="inputDesc" placeholder="상품 설명 (선택)"></textarea>
            </div>
            <div class="ac-form-field ac-form-full">
              <label>이미지 URL (선택)</label>
              <input type="url" id="inputImageUrl" placeholder="https://..." />
            </div>
            <div class="ac-form-field">
              <label>재고 (-1 = 무제한)</label>
              <input type="number" id="inputStock" value="-1" min="-1" step="1" />
            </div>
            <div class="ac-form-field" style="justify-content:flex-end;">
              <label style="margin-bottom:auto;"></label>
              <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.88rem;">
                <input type="checkbox" id="inputActive" checked />
                판매 활성화
              </label>
            </div>
            <div class="ac-form-actions">
              <button class="ac-btn ac-btn-primary" id="btnSaveProduct" type="button">등록</button>
              <button class="ac-btn ac-btn-ghost" id="btnCancelEdit" type="button" style="display:none;">취소</button>
            </div>
          </div>
          <div class="ac-status" id="productFormStatus"></div>
        </div>
      </section>

      <!-- 상품 목록 -->
      <section class="section">
        <div class="ac-section">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div class="ac-section-title" style="margin-bottom:0;">상품 목록</div>
            <button class="ac-btn ac-btn-primary" id="btnCopySelected" type="button" style="display:none;font-size:0.82rem;padding:6px 14px;">선택 복사</button>
          </div>
          <div id="productListState" class="ac-status" style="margin-bottom:8px;"></div>
          <div style="overflow-x:auto;">
            <table class="ac-table">
              <thead>
                <tr>
                  <th style="width:36px;text-align:center;"><input type="checkbox" id="chkAll" title="전체 선택" /></th>
                  <th>이미지</th>
                  <th>상품명</th>
                  <th>가격</th>
                  <th>재고</th>
                  <th>상태</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="productTbody"></tbody>
            </table>
          </div>
          <div id="productListEmpty" class="ac-status" style="display:none; text-align:center; padding:16px 0;">
            등록된 상품이 없습니다.
          </div>
        </div>
      </section>

    </div><!-- /adminContent -->

    <!-- 비인가 -->
    <div id="notAdminMsg" style="display:none;" class="panel" style="text-align:center; padding:32px;">
      <p class="hint">관리자 계정만 접근 가능합니다.</p>
    </div>

  </main>

  <div id="siteFooter"></div>

  <script type="module" src="/assets/js/pages/admin_coop.js"></script>
</body>
</html>

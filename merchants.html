<!-- /merchants.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>가맹점 지도 - Jump</title>

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />

  <style>
    .mc-wrap { max-width: 1100px; margin: 0 auto; padding: 0 12px 48px; }
    .mc-hd { padding: 18px 0 12px; }
    .mc-hd h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
    .mc-hd p  { font-size: 13px; color: #888; margin: 0; }

    /* 지도 */
    .mc-map-wrap {
      position: relative; height: 420px;
      border-radius: 10px; overflow: hidden;
      border: 1px solid #e0e0e0;
      margin-bottom: 16px;
      background: #f3f4f6;
    }
    @media (max-width: 600px) { .mc-map-wrap { height: 300px; } }
    #merchantMap { width: 100%; height: 100%; }

    /* 지도 위 HUD 버튼 (Google Maps Custom Control로 등록) */
    .map-hud-btn {
      background: #fff; border: none; border-radius: 50%;
      width: 42px; height: 42px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .map-hud-btn:hover { transform: scale(1.08); }

    /* 이동거리 표시판 */
    #distPanel {
      background: rgba(255,255,255,.93); border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
      padding: 5px 9px; min-width: 70px;
      display: none; flex-direction: column; align-items: center; gap: 2px;
    }
    #distPanel.active { display: flex; }
    #distPanel .dist-label { font-size: 9px; color: #888; letter-spacing: .3px; }
    #distPanel .dist-value { font-size: 13px; font-weight: 700; color: #1a73e8; }
    #btnResetDist {
      font-size: 9px; color: #999; background: none; border: none;
      cursor: pointer; padding: 0; line-height: 1;
    }
    #btnResetDist:hover { color: #e53e3e; }

    /* 범례 */
    .mc-legend {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: 12px; color: #555; margin-bottom: 12px;
    }
    .mc-legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; vertical-align: middle;
      margin-right: 4px; border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,.15);
    }

    /* 카드 그리드 */
    .mc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .mc-card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 14px 16px; cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .mc-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.1); border-color: #f59e0b; }
    .mc-card-name   { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .mc-card-career { font-size: 12px; color: #f59e0b; margin-bottom: 4px; }
    .mc-card-region { font-size: 12px; color: #888; }
    .mc-card-desc   { font-size: 12px; color: #555; margin-top: 6px; }
    .mc-card-no-map { font-size: 11px; color: #bbb; margin-top: 4px; }
    .mc-card-phone  { font-size: 12px; color: #374151; margin-top: 4px; }
    .mc-card-gmap   { display:inline-block; margin-top:8px; font-size:12px; color:#2563eb; text-decoration:none; }
    .mc-card-gmap:hover { text-decoration: underline; }
    .mc-badge-map {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 4px; background: #fef3c7; color: #92400e;
      margin-left: 6px; vertical-align: middle;
    }
    .mc-state { color: #888; font-size: 13px; padding: 20px 0; }
    .mc-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .mc-filter input {
      border: 1px solid #ccc; border-radius: 6px; padding: 6px 10px;
      font-size: 13px; outline: none; flex: 1; min-width: 160px;
    }
    .mc-filter input:focus { border-color: #f59e0b; }
    .mc-count { font-size: 12px; color: #888; }

    /* ── 보물 수집 토스트 ── */
    #collectToast {
      display: none;
      position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
      background: #1a1208; color: #ffd700;
      padding: 14px 24px; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 24px rgba(0,0,0,.45);
      z-index: 9999; text-align: center;
      border: 2px solid #7a5c3a;
      animation: treasurePop .3s ease;
      white-space: pre-line;
    }
    @keyframes treasurePop {
      from { transform: translateX(-50%) scale(.8); opacity: 0; }
      to   { transform: translateX(-50%) scale(1);  opacity: 1; }
    }

    /* ── 인벤토리 모달 ── */
    #invModal {
      display: none;
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,.65);
      align-items: flex-start; justify-content: center;
      overflow-y: auto;
      padding: 16px 0;
    }
    #invModal.open { display: flex; }

    .inv-panel {
      background: #2c1a0e;
      border: 3px solid #7a5c3a;
      border-radius: 16px;
      padding: 0;
      width: 380px; max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.7);
      overflow: hidden;
      flex-shrink: 0;
      margin: auto 0;
    }
    .inv-header {
      background: linear-gradient(135deg, #5c3a1e, #3d2410);
      color: #ffd700;
      padding: 14px 20px;
      font-size: 16px; font-weight: 800;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid #7a5c3a;
      position: sticky; top: 0; z-index: 1;
    }
    .inv-close {
      background: none; border: none; color: #ffd700;
      font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .inv-body { padding: 16px; }

    /* 4×5 슬롯 그리드 */
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .inv-slot {
      aspect-ratio: 1;
      background: #1a0e06;
      border: 2px solid #5c3a1e;
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      transition: border-color .15s;
    }
    .inv-slot.has-item { border-color: #7a5c3a; cursor: default; }
    .inv-slot img {
      width: 70%; height: 70%; object-fit: contain;
      image-rendering: pixelated;
    }
    .inv-slot .slot-placeholder { font-size: 20px; opacity: .15; }
    .inv-slot .slot-count {
      position: absolute; bottom: 2px; right: 4px;
      font-size: 10px; font-weight: 700; color: #ffd700;
      text-shadow: 0 1px 2px #000;
    }
    .inv-slot .slot-name {
      font-size: 8px; color: #c9a870; text-align: center;
      padding: 0 2px; line-height: 1.2;
      position: absolute; bottom: 14px; left: 0; right: 0;
    }

    /* 조합 섹션 */
    .inv-craft-title {
      color: #ffd700; font-size: 13px; font-weight: 700;
      margin-bottom: 10px; border-top: 1px solid #5c3a1e; padding-top: 12px;
    }
    .voucher-row {
      background: #1a0e06; border: 1px solid #5c3a1e; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .voucher-name { font-weight: 700; font-size: 13px; color: #ffd700; margin-bottom: 4px; }
    .voucher-reqs { font-size: 11px; color: #c9a870; margin-bottom: 8px; line-height: 1.6; }
    .voucher-reward { font-size: 11px; color: #86efac; margin-bottom: 8px; }
    .btn-craft {
      background: #7a5c3a; color: #ffd700; border: none;
      padding: 5px 14px; border-radius: 6px; font-size: 12px;
      font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn-craft:hover:not(:disabled) { background: #9a7c5a; }
    .btn-craft:disabled { opacity: .4; cursor: not-allowed; }
    .voucher-empty { color: #888; font-size: 12px; padding: 8px 0; }

    /* ── 미개봉 보물박스 슬롯 ── */
    .box-inv-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 4px;
    }
    .box-inv-slot {
      width: 56px; height: 56px;
      background: #1a0e06;
      border: 2px solid #7a5c3a;
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: border-color .15s, transform .1s;
    }
    .box-inv-slot:hover { border-color: #ffd700; transform: scale(1.07); }
    .box-inv-slot img { width: 34px; height: 34px; object-fit: contain; image-rendering: pixelated; }
    .box-inv-slot .box-slot-name {
      font-size: 7px; color: #c9a870; text-align: center;
      position: absolute; bottom: 3px; left: 0; right: 0;
      padding: 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .box-inv-slot.opening { animation: boxShake .4s ease; border-color: #ffd700; }
    @keyframes boxShake {
      0%,100%{ transform: rotate(0); }
      20%    { transform: rotate(-8deg) scale(1.1); }
      40%    { transform: rotate(8deg) scale(1.15); }
      60%    { transform: rotate(-5deg) scale(1.1); }
      80%    { transform: rotate(5deg) scale(1.05); }
    }

    /* ── 아이템 획득 오버레이 ── */
    #itemReveal {
      display: none;
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.8);
      align-items: center; justify-content: center;
    }
    #itemReveal.open { display: flex; }
    .item-reveal-panel {
      background: #2c1a0e; border: 3px solid #ffd700;
      border-radius: 20px; padding: 32px 28px;
      text-align: center; animation: revealPop .4s cubic-bezier(.34,1.56,.64,1);
      min-width: 220px;
    }
    @keyframes revealPop {
      from { transform: scale(.5); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .item-reveal-title { color: #ffd700; font-size: 18px; font-weight: 800; margin-bottom: 16px; }
    .item-reveal-img { width: 80px; height: 80px; object-fit: contain; image-rendering: pixelated; margin-bottom: 12px; }
    .item-reveal-name { color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .btn-reveal-close {
      background: #7a5c3a; color: #ffd700; border: none;
      padding: 8px 24px; border-radius: 8px; font-size: 14px;
      font-weight: 700; cursor: pointer;
    }
    .btn-reveal-close:hover { background: #9a7c5a; }

    /* ── 전투 HUD ─────────────────────────────────────────────────── */
    #combatHud {
      background: rgba(10,10,20,0.82); border-radius: 12px;
      padding: 10px 14px; color: #fff; font-size: 11px;
      min-width: 188px; margin: 0 0 8px 8px; user-select: none;
    }
    .c-lv { font-weight:700; font-size:13px; color:#fbbf24; margin-bottom:6px; text-align:center; }
    .c-row { display:flex; align-items:center; gap:6px; margin:4px 0; }
    .c-lbl { width:16px; font-size:10px; font-weight:700; }
    .c-hp-lbl { color:#f87171; } .c-mp-lbl { color:#60a5fa; }
    .c-bar { flex:1; height:8px; background:rgba(255,255,255,.12); border-radius:4px; overflow:hidden; }
    .c-fill { height:100%; border-radius:4px; transition:width .3s; }
    .c-fill-hp { background:linear-gradient(90deg,#ef4444,#f87171); }
    .c-fill-mp { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
    .c-fill-hp.low { background:#ef4444; animation:cPulse .7s infinite; }
    .c-val { font-size:9px; color:#d1d5db; white-space:nowrap; min-width:58px; text-align:right; }
    .c-spd { margin-top:4px; font-size:10px; color:#6ee7b7; text-align:center; }
    .c-dead { color:#ef4444; font-weight:700; font-size:12px; text-align:center; margin-top:4px; animation:cPulse 1s infinite; }
    @keyframes cPulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── 관리자 전투 배치 패널 ─────────────────────────────────────── */
    #adminBattlePanel {
      background: rgba(10,10,20,0.88); border-radius:10px;
      padding:8px; display:none; flex-direction:column;
      gap:4px; margin:0 0 8px 8px; min-width:130px;
    }
    #adminBattlePanel.open { display:flex; }
    .ab-title { font-size:10px; color:#9ca3af; padding:2px 0 4px;
      border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:2px; }
    .ab-btn { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
      color:#fff; border-radius:6px; padding:5px 8px; font-size:11px;
      cursor:pointer; text-align:left; white-space:nowrap; }
    .ab-btn:hover { background:rgba(255,255,255,.18); }
    .ab-btn.placing { background:rgba(239,68,68,.35); border-color:#ef4444; }

    /* ── 데미지 / 힐 숫자 오버레이 ────────────────────────────────── */
    #battleOverlay { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:200; }
    .dmg-float {
      position:absolute; font-weight:800; font-size:18px;
      text-shadow:0 1px 4px rgba(0,0,0,.9);
      transform:translate(-50%,-50%);
      animation:dmgUp 1.1s ease-out forwards;
      pointer-events:none; white-space:nowrap;
    }
    @keyframes dmgUp {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
      30%  { opacity:1; transform:translate(-50%,-90%) scale(1); }
      100% { opacity:0; transform:translate(-50%,-160%) scale(.7); }
    }
    /* 화살 발사체 */
    .arrow-proj {
      position:absolute; pointer-events:none; z-index:301;
      width:22px; height:5px; border-radius:3px;
      transform-origin:left center;
      transition:left .28s linear, top .28s linear;
    }
    /* 타격 이펙트 */
    .hit-flash {
      position:absolute; pointer-events:none; z-index:302;
      width:24px; height:24px; border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      animation:hitFlash .3s ease-out forwards;
    }
    @keyframes hitFlash {
      0%   { transform:translate(-50%,-50%) scale(0);   opacity:1; }
      50%  { transform:translate(-50%,-50%) scale(1.8); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(2.4); opacity:0; }
    }
    /* 타워 발사체 */
    .tower-proj {
      position:absolute; pointer-events:none; z-index:301;
      width:30px; height:7px; border-radius:0 3px 3px 0;
      background:linear-gradient(90deg,#7c3aed,#e879f9);
      box-shadow:0 0 8px #a855f7, 0 0 3px #fff;
      transform-origin:left center;
      transition:left .32s linear, top .32s linear;
    }
    .tower-proj::after {
      content:''; position:absolute; right:-7px; top:-3px;
      border-left:9px solid #e879f9;
      border-top:6px solid transparent; border-bottom:6px solid transparent;
    }
    /* 타워 발사 링 */
    .tower-launch-ring {
      position:absolute; pointer-events:none; z-index:303;
      width:30px; height:30px; border-radius:50%;
      border:2px solid #a855f7;
      transform:translate(-50%,-50%) scale(0);
      animation:towerLaunch .35s ease-out forwards;
    }
    @keyframes towerLaunch {
      0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(2.8); opacity:0; }
    }
    /* 타워 임팩트 */
    .tower-impact {
      position:absolute; pointer-events:none; z-index:302;
      width:40px; height:40px; border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      background:radial-gradient(circle,rgba(168,85,247,.9),transparent);
      animation:towerImpact .38s ease-out forwards;
    }
    @keyframes towerImpact {
      0%   { transform:translate(-50%,-50%) scale(0);   opacity:1; }
      60%  { transform:translate(-50%,-50%) scale(1.6); opacity:.9; }
      100% { transform:translate(-50%,-50%) scale(2.8); opacity:0; }
    }
    /* 대포 투사체 */
    .cannon-proj {
      position:absolute; pointer-events:none; z-index:301;
      width:14px; height:14px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#888,#222);
      box-shadow:0 0 6px rgba(255,120,0,.8), 0 2px 4px rgba(0,0,0,.6);
      transform:translate(-50%,-50%);
      transition:left .55s linear, top .55s linear;
    }
    /* 대포 발사 화염 */
    .cannon-muzzle {
      position:absolute; pointer-events:none; z-index:303;
      width:20px; height:20px; border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      background:radial-gradient(circle,#ffdd00,#ff6600,transparent);
      animation:cannonMuzzle .25s ease-out forwards;
    }
    @keyframes cannonMuzzle {
      0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(2.2); opacity:0; }
    }
    /* 대포 폭발 */
    .cannon-blast {
      position:absolute; pointer-events:none; z-index:302;
      width:56px; height:56px; border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      background:radial-gradient(circle,#fff 10%,#ffdd00 35%,#ff4400 65%,transparent);
      animation:cannonBlast .45s ease-out forwards;
    }
    @keyframes cannonBlast {
      0%   { transform:translate(-50%,-50%) scale(0);   opacity:1; }
      50%  { transform:translate(-50%,-50%) scale(1.3); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(2.2); opacity:0; }
    }
    /* 크리티컬 알림 */
    #criticalToast {
      position:fixed; top:30%; left:50%; transform:translateX(-50%) scale(0);
      z-index:9999; pointer-events:none;
      font-size:2rem; font-weight:900; letter-spacing:3px;
      color:#fff; text-shadow:0 0 12px #ff6600, 0 0 28px #ff0000, 2px 2px 0 #000;
      animation:none;
    }
    @keyframes critPop {
      0%   { transform:translateX(-50%) scale(0);   opacity:0; }
      20%  { transform:translateX(-50%) scale(1.4); opacity:1; }
      50%  { transform:translateX(-50%) scale(1.1); opacity:1; }
      80%  { transform:translateX(-50%) scale(1.0); opacity:1; }
      100% { transform:translateX(-50%) scale(0.8); opacity:0; }
    }
  </style>

  <script>window.__mapsKey = "AIzaSyC5zrzVsTqshKYI4vS3og6jXaS-vlx2ujM";</script>
  <script src="/assets/js/partials.js" defer></script>
</head>
<body>
  <div id="criticalToast">💥 CRITICAL!</div>
  <div id="siteHeader"></div>

  <main class="page">
    <div class="mc-wrap">

      <div class="mc-hd">
        <h1>🗺️우리동네지도</h1>
        <p>Jump 네트워크에 등록된 가맹점을 지도에서 확인하세요.</p>
      </div>

      <!-- 지도 -->
      <div class="mc-map-wrap" style="position:relative;">
        <div id="merchantMap"></div>
        <div id="battleOverlay"></div>
      </div>
      <!-- HUD: initMap()에서 Google Maps Custom Control로 등록됨 -->
      <div id="mapHud" style="display:flex;flex-direction:column;gap:8px;margin:0 8px 8px 0;align-items:center;">
        <button id="btnInventory" class="map-hud-btn" title="인벤토리">🎒</button>
        <button id="btnMyLocation" class="map-hud-btn" title="내 위치">📍</button>
        <div id="distPanel">
          <span class="dist-label">이동거리</span>
          <span class="dist-value" id="distValue">0m</span>
          <button id="btnResetDist" title="초기화">↺ 초기화</button>
        </div>
      </div>

      <!-- 전투 HUD (LEFT_BOTTOM 커스텀 컨트롤) -->
      <div id="combatHud">
        <div class="c-lv" id="cLv">LV.1</div>
        <div class="c-row">
          <span class="c-lbl c-hp-lbl">HP</span>
          <div class="c-bar"><div class="c-fill c-fill-hp" id="cHpBar" style="width:100%"></div></div>
          <span class="c-val" id="cHpVal">1000 / 1000</span>
        </div>
        <div class="c-row">
          <span class="c-lbl c-mp-lbl">MP</span>
          <div class="c-bar"><div class="c-fill c-fill-mp" id="cMpBar" style="width:100%"></div></div>
          <span class="c-val" id="cMpVal">1000 / 1000</span>
        </div>
        <div class="c-spd" id="cSpd">SPD — km/h</div>
        <div class="c-dead" id="cDead" style="display:none;">💀 사망 — 이동하여 부활</div>
      </div>

      <!-- 관리자 전투 배치 패널 (LEFT_BOTTOM 커스텀 컨트롤) -->
      <div id="adminBattlePanel">
        <div class="ab-title">⚔️ 전투 배치</div>
        <button class="ab-btn" id="btnPlaceMonster">🐉 몬스터 추가</button>
        <button class="ab-btn" id="btnPlaceArcherTower">🏹 아처타워</button>
        <button class="ab-btn" id="btnPlaceCannonTower">💣 대포타워</button>
        <button class="ab-btn" id="btnPlaceDeco">🎨 데코 배치</button>
        <button class="ab-btn" id="btnCancelPlace" style="display:none;color:#fca5a5;">✕ 배치 취소</button>
        <button class="ab-btn" id="btnToggleTowerRange" style="margin-top:4px;">👁 범위 표시</button>
      </div>

      <!-- 범례 -->
      <div class="mc-legend">
        <span><span class="mc-legend-dot" style="background:#f59e0b;"></span>가맹점</span>
        <span><span class="mc-legend-dot" style="background:#ffd700; border-color:#7a5c3a;"></span>보물박스 (활성)</span>
        <span><span class="mc-legend-dot" style="background:#888;"></span>보물박스 (비활성)</span>
        <span><span class="mc-legend-dot" style="background:#ef4444;"></span>병원</span>
        <span><span class="mc-legend-dot" style="background:#16a34a;"></span>학교</span>
        <span><span class="mc-legend-dot" style="background:#22c55e;"></span>공원</span>
        <span><span class="mc-legend-dot" style="background:#ec4899;"></span>쇼핑</span>
        <span><span class="mc-legend-dot" style="background:#6b7280;"></span>기타장소</span>
        <span><span class="mc-legend-dot" style="background:#4285F4;"></span>내 위치</span>
      </div>

      <!-- 필터 -->
      <div class="mc-filter">
        <input type="text" id="mcSearch" placeholder="가맹점명, 업종, 지역 검색…" />
        <span class="mc-count" id="mcCount"></span>
      </div>

      <!-- 카드 목록 -->
      <div class="mc-grid" id="mcGrid">
        <p class="mc-state">불러오는 중...</p>
      </div>

    </div>
  </main>

  <div id="siteFooter"></div>

  <!-- 보물 수집 토스트 -->
  <div id="collectToast"></div>

  <!-- 아이템 획득 오버레이 -->
  <div id="itemReveal">
    <div class="item-reveal-panel">
      <div class="item-reveal-title">✨ 아이템 획득!</div>
      <img id="itemRevealImg" class="item-reveal-img" src="" alt="" onerror="this.style.display='none'">
      <div class="item-reveal-name" id="itemRevealName"></div>
      <button class="btn-reveal-close" id="btnRevealClose">확인</button>
    </div>
  </div>

  <!-- 인벤토리 모달 -->
  <div id="invModal">
    <div class="inv-panel">
      <div class="inv-header">
        🎒 인벤토리
        <button class="inv-close" id="btnCloseInv">✕</button>
      </div>
      <div class="inv-body">
        <!-- 미개봉 보물박스 -->
        <div class="inv-craft-title" style="padding-top:0;border-top:none;">📦 미개봉 보물박스</div>
        <div id="boxInvList"><div class="voucher-empty">불러오는 중...</div></div>

        <!-- 4×5 슬롯 -->
        <div class="inv-craft-title">🎒 수집한 아이템</div>
        <div class="inv-grid" id="invGrid"></div>

        <!-- 바우처 조합 -->
        <div class="inv-craft-title">⚗️ 아이템 조합</div>
        <div id="voucherList"><div class="voucher-empty">조합 레시피 불러오는 중...</div></div>

        <!-- 보유 바우처 -->
        <div class="inv-craft-title">🎟 보유 바우처</div>
        <div id="myVoucherList"><div class="voucher-empty">불러오는 중...</div></div>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/js/header-auth.js"></script>
  <script type="module" src="/assets/js/pages/merchants.js"></script>
</body>
</html>

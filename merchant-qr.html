<!-- /merchant-qr.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR 결제 | Jump</title>

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />

  <script src="/assets/js/partials.js" defer></script>
  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/header-auth.js"></script>

  <!-- QR 코드 생성 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    .qr-card {
      background: #fff;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      margin: 0 auto;
      text-align: center;
    }
    .qr-canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
      border: 2px solid var(--accent, #7c3aed);
      border-radius: 12px;
      padding: 12px;
      margin: 16px auto;
      width: fit-content;
    }
    .qr-canvas-wrap canvas {
      display: block;
      border-radius: 4px;
    }
    .qr-amount-label {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent, #7c3aed);
      margin: 8px 0 4px;
    }
    .qr-merchant-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .qr-hint {
      font-size: 0.82rem;
      color: var(--muted, #6b7280);
      margin-top: 8px;
    }
    .btn-download {
      margin-top: 12px;
      background: var(--surface, #f3f4f6);
      color: var(--text, #111);
      border: 1px solid var(--border, #e5e7eb);
    }
    .btn-download:hover {
      background: var(--border, #e5e7eb);
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>

<body>
  <div id="siteHeader"></div>

  <main class="page">
    <section class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">QR 결제</h1>
        <p class="hero-desc">금액을 입력하면 고객이 스캔할 수 있는 QR 코드가 생성됩니다.</p>
      </div>
    </section>

    <section class="panel" style="max-width:480px; margin:0 auto;">
      <div class="panel-body">

        <!-- 비로그인 -->
        <div id="needLoginPanel" style="display:none;">
          <p class="hint">로그인이 필요합니다.</p>
          <button class="btn" id="btnLogin" type="button">구글 로그인</button>
        </div>

        <!-- 가맹점 미등록 -->
        <div id="needMerchantPanel" style="display:none;">
          <p class="hint" style="color:var(--danger,#e53e3e);">가맹점 등록이 필요합니다.</p>
          <a class="btn" href="/family-register.html">가맹점 등록하기 →</a>
        </div>

        <!-- 메인 폼 -->
        <div id="mainPanel" style="display:none;">
          <!-- 가맹점 정보 -->
          <div class="mp-kv" style="margin-bottom:16px;">
            <span class="k">가맹점</span>
            <span class="v" id="qrMerchantName" style="font-weight:700;">로딩 중...</span>
          </div>
          <div class="mp-kv" style="margin-bottom:20px;">
            <span class="k">가맹점 ID</span>
            <span class="v mono" id="qrMerchantId">-</span>
          </div>

          <!-- 금액 입력 -->
          <form id="qrForm">
            <!-- 통화 선택 -->
            <div class="field" style="margin-bottom:12px;">
              <span class="label">결제 통화</span>
              <div style="display:flex;gap:16px;margin-top:6px;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.95rem;">
                  <input type="radio" name="qrCurrency" id="currKrw" value="KRW" checked />
                  <span>🇰🇷 원화 (KRW)</span>
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.95rem;">
                  <input type="radio" name="qrCurrency" id="currVnd" value="VND" />
                  <span>🇻🇳 동 (VND)</span>
                </label>
              </div>
            </div>

            <label class="field">
              <span class="label" id="qrAmountLabel">결제 금액 (원)</span>
              <input
                class="input"
                id="qrAmount"
                type="number"
                min="1000"
                step="100"
                placeholder="예: 30000"
                required
              />
              <div class="help" id="qrAmountHelp">최소 1,000원 이상 입력해 주세요.</div>
              <!-- VND 입력 시 KRW 환산 표시 -->
              <div id="qrAmountConvert" style="display:none; margin-top:6px; padding:6px 10px;
                   background:var(--surface,#f9fafb); border-radius:8px; font-size:0.85rem; color:var(--muted,#6b7280);">
                ≈ <span id="qrAmountKrw">-</span>원 (KRW)
              </div>
            </label>

            <button class="btn" type="submit" id="btnGenQr" style="width:100%; margin-top:4px;">
              QR 코드 생성
            </button>
          </form>

          <!-- QR 출력 -->
          <div id="qrSection" style="display:none; margin-top:24px;">
            <div class="qr-card">
              <div class="qr-merchant-name" id="qrCardMerchant"></div>
              <div class="qr-amount-label" id="qrCardAmount"></div>
              <div class="qr-canvas-wrap">
                <canvas id="qrCanvas"></canvas>
              </div>
              <div class="qr-hint">고객이 카메라로 QR을 스캔하면 결제 페이지가 열립니다.</div>
              <button class="btn btn-download" id="btnDownloadQr" type="button">
                QR 이미지 저장
              </button>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module" src="/assets/js/pages/merchant-qr.js"></script>
</body>
</html>

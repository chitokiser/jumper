<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내 주문 - Jovial Travel</title>

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.14.0/dist/ethers.umd.min.js"></script>

  <script src="/assets/js/partials.js"></script>

  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/firestore-bridge.js"></script>

  <script type="module" src="/assets/js/pages/orders.js"></script>
</head>

<body>
  <div id="siteHeader"></div>

  <main class="page">
    <section class="hero hero--compact">
      <div class="hero-inner">
        <h1 class="hero-title">내 주문</h1>
        <p class="hero-sub">
          주문 목록과 내가 남긴 리뷰를 한 번에 확인할 수 있습니다.
        </p>
      </div>
    </section>

    <section class="panel">
      <div class="panel-inner">

        <div class="tabs">
          <button class="tab tab--active" id="tabOrders" type="button">주문</button>
          <button class="tab" id="tabReviews" type="button">내 리뷰</button>
          <span class="tab-spacer"></span>
          <button class="btn btn-ghost" id="btnReload" type="button">새로고침</button>
        </div>

        <div id="state" class="state"></div>

        <div id="viewOrders">
          <div id="ordersList" class="list"></div>
        </div>

        <div id="viewReviews" style="display:none">
          <div id="myReviewsList" class="list"></div>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>
</body>
</html>

<!-- /buggy-driver.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>버기카 기사 앱</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest-driver.webmanifest" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="기사앱" />
  <link rel="apple-touch-icon" href="/assets/images/jump/mlogo.png" />

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/pages/buggy.css" />

  <!-- PWA 설치 안내 (Android beforeinstallprompt + iOS Safari 가이드) -->
  <script src="/assets/js/pwa-install.js" defer></script>
</head>
<body>
  <!-- 로그인 화면 (비로그인 시 표시) -->
  <div id="drvLoginScreen" style="
    display:none;min-height:100dvh;background:#fffbeb;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;text-align:center;">
    <div style="font-size:4rem;margin-bottom:12px;">🚗</div>
    <h1 style="font-size:1.4rem;font-weight:800;color:#92400e;margin:0 0 8px;">버기카 기사 앱</h1>
    <p style="color:#78716c;font-size:0.9rem;margin:0 0 32px;">오션파크 버기카 기사 전용</p>
    <button id="btnDrvGoogleLogin" style="
      display:flex;align-items:center;gap:10px;
      background:#fff;border:2px solid #f59e0b;border-radius:12px;
      padding:14px 24px;font-size:1rem;font-weight:700;cursor:pointer;
      color:#92400e;box-shadow:0 2px 8px rgba(245,158,11,.2);">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
           width="22" height="22" alt="Google" />
      Google 로그인
    </button>
    <p id="drvLoginError" style="color:#dc2626;font-size:0.85rem;margin-top:16px;display:none;"></p>
  </div>

  <main class="buggy-wrap" id="drvMain" style="display:none;">

    <div class="buggy-header">
      <span class="buggy-icon">🧑‍✈️</span>
      <div>
        <h1>기사 앱</h1>
        <div style="font-size:0.8rem;color:#78716c;" id="driverNameLabel">로그인 중...</div>
      </div>
      <span id="onlineBadge" class="buggy-badge buggy-badge--offline" style="margin-left:auto;">오프라인</span>
    </div>

    <!-- 온/오프라인 토글 -->
    <div class="buggy-card" style="margin-bottom:14px;">
      <div class="buggy-row">
        <span class="k">운행 상태</span>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="chkOnline" style="width:40px;height:22px;cursor:pointer;" />
          <span id="onlineLabel" style="font-weight:700;">오프라인</span>
        </label>
      </div>
      <div class="buggy-row">
        <span class="k">차량번호</span>
        <span class="v" id="driverPlate">-</span>
      </div>
    </div>

    <!-- ── 섹션 A: 대기 중 ── -->
    <div class="buggy-section active" id="drvSecIdle">
      <div class="buggy-empty">
        <div class="buggy-empty-icon">📡</div>
        <div>새로운 호출을 기다리는 중입니다.</div>
        <div style="font-size:0.78rem;margin-top:4px;color:#a8a29e;">온라인 상태를 켜두세요.</div>
      </div>
    </div>

    <!-- ── 섹션 B: 호출 수신 ── -->
    <div class="buggy-section" id="drvSecRequest">
      <div class="buggy-driver-ride-card" id="incomingCard">
        <h3>📨 새 호출 요청</h3>
        <div class="buggy-row"><span class="k">탑승 위치</span><span class="v" id="reqPickupAddr">-</span></div>
        <div class="buggy-row"><span class="k">도착지</span><span class="v" id="reqDestAddr">-</span></div>
        <div class="buggy-row"><span class="k">요청자</span><span class="v" id="reqUserName">-</span></div>
        <div style="margin-top:6px;font-size:0.8rem;color:#78716c;" id="reqCountdown">⏳ 120초 내 응답해주세요</div>
      </div>
      <button class="buggy-btn buggy-btn--success" id="btnAccept">✅ 수락</button>
      <button class="buggy-btn buggy-btn--ghost"   id="btnDecline">거절 (다음 기사)</button>
    </div>

    <!-- ── 섹션 C: 이동 중 (탑승 전) ── -->
    <div class="buggy-section" id="drvSecGoing">
      <div id="drvMap" style="width:100%;height:280px;border-radius:14px;overflow:hidden;border:2px solid var(--buggy-border);margin-bottom:14px;"></div>
      <div class="buggy-driver-ride-card">
        <h3 id="goSectionTitle">🚗 이동 중 — 탑승 위치로</h3>
        <div class="buggy-row"><span class="k">탑승 위치</span><span class="v" id="goPickupAddr">-</span></div>
        <div class="buggy-row"><span class="k">요청자</span><span class="v" id="goUserName">-</span></div>
        <div class="buggy-row"><span class="k">상태</span><span class="v" id="goStatusBadge">-</span></div>
        <div class="buggy-row" id="goDistanceRow" style="display:none;">
          <span class="k">탑승자까지</span>
          <span class="v" id="goDistanceLabel" style="font-weight:700;color:#f59e0b;">-</span>
        </div>
      </div>
      <button class="buggy-btn buggy-btn--info"    id="btnArrive">📍 탑승 위치 도착</button>
      <button class="buggy-btn buggy-btn--success" id="btnStartManual" style="display:none;">▶️ 탑승 시작</button>
      <button class="buggy-btn buggy-btn--ghost"   id="btnCancelGoing">호출 취소</button>
    </div>

    <!-- ── 섹션 D: 탑승 중 ── -->
    <div class="buggy-section" id="drvSecRiding">
      <div class="buggy-driver-ride-card">
        <h3>✅ 운행 중</h3>
        <div class="buggy-timer" id="drvTimer">00:00</div>
        <div class="buggy-timer-label">경과 시간</div>
        <div class="buggy-fare-preview" id="drvFarePrev">₫50,000</div>
        <div style="text-align:center;font-size:0.75rem;color:#78716c;margin-bottom:10px;">예상 요금</div>
        <div class="buggy-row"><span class="k">탑승자</span><span class="v" id="rideUserName">-</span></div>
        <div class="buggy-row"><span class="k">탑승 시작</span><span class="v" id="rideStartedAt">-</span></div>
      </div>
      <button class="buggy-btn buggy-btn--primary" id="btnStart" style="display:none;">▶️ 탑승 시작</button>
      <button class="buggy-btn buggy-btn--danger"  id="btnEnd">🔴 운행 종료</button>
    </div>

    <!-- ── 섹션 E: 완료 ── -->
    <div class="buggy-section" id="drvSecDone">
      <div class="buggy-card" style="text-align:center;padding:28px 16px;">
        <div style="font-size:3rem;margin-bottom:8px;">✅</div>
        <div style="font-size:1.15rem;font-weight:800;margin-bottom:4px;">운행 완료</div>
        <div class="buggy-row" style="justify-content:center;gap:4px;">
          <span class="k">운행 시간:</span><span class="v" id="drvDoneMinutes">-</span>
        </div>
        <div class="buggy-row" style="justify-content:center;gap:4px;">
          <span class="k">요금:</span><span class="v" id="drvDoneFare">-</span>
        </div>
        <div id="drvDonePayStatus" style="margin-top:8px;font-size:0.85rem;"></div>
      </div>
      <button class="buggy-btn buggy-btn--primary" id="btnBackToIdle">다음 호출 대기</button>
    </div>

  </main><!-- #drvMain -->

  <div class="buggy-toast" id="drvToast"></div>

  <!-- 기사앱 홈화면 추가 안내 배너 -->
  <div id="driverInstallBanner" style="
    display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
    background:#f59e0b;color:#fff;padding:14px 16px 20px;
    box-shadow:0 -4px 20px rgba(0,0,0,.2);
    transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);">
    <div style="display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto;">
      <img src="/assets/images/jump/jump_cart.png"
           style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;" />
      <div style="flex:1;min-width:0;">
        <div style="font-weight:800;font-size:0.95rem;">기사앱을 홈 화면에 추가하세요</div>
        <div style="font-size:0.78rem;opacity:.9;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
             id="driverInstallSub">앱처럼 바로 실행할 수 있습니다</div>
      </div>
      <button id="btnDriverInstall" style="
        background:#fff;color:#92400e;border:none;border-radius:8px;
        padding:9px 16px;font-weight:800;font-size:0.88rem;cursor:pointer;flex-shrink:0;">
        홈에 추가
      </button>
      <button id="btnDriverInstallDismiss" style="
        background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;
        padding:4px 6px;opacity:.85;flex-shrink:0;">✕</button>
    </div>
  </div>

  <script>
  (() => {
    const KEY    = 'buggy_driver_install_dismissed_v2';
    const banner = document.getElementById('driverInstallBanner');
    const btnAdd = document.getElementById('btnDriverInstall');
    const btnX   = document.getElementById('btnDriverInstallDismiss');
    const sub    = document.getElementById('driverInstallSub');

    // Service Worker 등록 (PWA 필수)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // 이미 설치됐거나 dismissed면 종료
    if (localStorage.getItem(KEY) === '1') return;
    if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;
    if (!(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent))) return;

    const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent) &&
                  /WebKit/.test(navigator.userAgent) &&
                  !(/CriOS|FxiOS/.test(navigator.userAgent));

    function showBanner() {
      banner.style.display = 'block';
      // 한 프레임 뒤에 슬라이드업 애니메이션
      requestAnimationFrame(() => requestAnimationFrame(() => {
        banner.style.transform = 'translateY(0)';
      }));
    }

    function hideBanner(dismiss) {
      banner.style.transform = 'translateY(100%)';
      setTimeout(() => { banner.style.display = 'none'; }, 350);
      if (dismiss) localStorage.setItem(KEY, '1');
    }

    if (isIos) {
      // iOS Safari: 2초 후 자동 표시
      sub.textContent    = '공유(□↑) → 홈 화면에 추가를 눌러주세요';
      btnAdd.textContent = '확인';
      setTimeout(showBanner, 2000);
      btnAdd.addEventListener('click', () => hideBanner(true));
    } else {
      // Android Chrome: beforeinstallprompt 즉시 표시
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        showBanner();
      });
      window.addEventListener('appinstalled', () => hideBanner(false));
      btnAdd.addEventListener('click', async () => {
        if (!window.__pwaInstallPrompt) return;
        window.__pwaInstallPrompt.prompt();
        const { outcome } = await window.__pwaInstallPrompt.userChoice;
        if (outcome === 'accepted') hideBanner(false);
        window.__pwaInstallPrompt = null;
      });
    }

    btnX.addEventListener('click', () => hideBanner(true));
  })();
  </script>

  <script type="module" src="/assets/js/pages/buggy-driver.js"></script>
</body>
</html>

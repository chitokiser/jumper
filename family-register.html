<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>판매조합원참여 - Jovial</title>

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <link rel="stylesheet" href="/assets/css/pages/apply-guide.css" />

  <script src="/assets/js/partials.js" defer></script>
</head>
<body>
  <div id="siteHeader"></div>

  <main class="page">
    <section class="panel">
      <h1 class="title">판매조합원 참여</h1>
      <p class="desc">여유방(홈스테이) 또는 놀거리(체험·여행·클래스·가맹점 등)가 있다면 조합원으로 참여할 수 있습니다.</p>

      <div id="applyState" class="state">로딩...</div>

      <div class="status-box" id="statusBox" style="display:none;">
        <div class="status-row">
          <div class="k">현재 상태</div>
          <div class="v" id="statusText">-</div>
        </div>
        <div class="status-row" id="statusReasonRow" style="display:none;">
          <div class="k">사유</div>
          <div class="v danger" id="statusReason">-</div>
        </div>
      </div>

      <form class="form hide" id="applyForm">
        <label class="field">
          <span>한줄 소개</span>
          <input type="text" id="intro" maxlength="80" placeholder="예: 다낭 로컬투어 5년 운영" />
        </label>

        <label class="field">
          <span>휴대폰 번호 (알림톡 자동 안내)</span>
          <input type="tel" id="phone" maxlength="30" placeholder="예: +82 10 1234 5678 / +84 912 345 678" />
        </label>

        <label class="field">
          <span>카카오 ID (선택)</span>
          <input type="text" id="kakaoId" maxlength="40" placeholder="예: jovialtravel" />
        </label>

        <label class="check">
          <input type="checkbox" id="agreeKakao" />
          <span>처리상태 자동 알림(카카오 알림톡/문자) 수신에 동의합니다</span>
        </label>

        <label class="field">
          <span>정산 지갑주소 (필요한 경우)</span>
          <input type="text" id="walletAddress" maxlength="60" placeholder="0x로 시작하는 42자리 주소" />
        </label>

        <label class="field">
          <span>활동 지역 (오션파크 1/2/3 등)</span>
          <input type="text" id="region" maxlength="40" placeholder="예: 다낭 / 하노이" />
        </label>

        <label class="field">
          <span>어떤 조합원인가요?</span>
          <input type="text" id="career" maxlength="80" placeholder="예: 스파, 투어, 맛집, 사진촬영" />
        </label>

        <label class="field">
          <span>상세 설명</span>
          <textarea id="detail" rows="6" maxlength="600" placeholder="어떤 놀거리/공간을 함께할지 자세히 적어주세요"></textarea>
        </label>

        <div class="actions">
          <button class="btn primary" type="submit" id="btnSave">참여 저장 / 갱신</button>
          <button class="btn danger" type="button" id="btnWithdraw">참여 철회(삭제)</button>
        </div>

        <div class="hint">
          저장하면 검수중(pending) 상태로 유지됩니다. 승인되면 조합원로 활동할 수 있습니다.
        </div>
      </form>

      <div class="note">
        운영 안내:
      </div>
    </section>

    <!-- ── 멘토 이메일 등록 (linkMentor) ── -->
    <section class="panel" id="mentorLinkPanel" style="display:none; margin-top:20px;">
      <h2 style="font-size:1.1rem; margin:0 0 6px; color:var(--text);">멘토 이메일 등록</h2>
      <p class="desc">MetaMask 지갑으로 서명하여 내 구글 이메일과 지갑 주소를 연결합니다.<br>
        레벨 4 이상의 지갑만 등록 가능합니다.</p>

      <!-- 이미 연결된 경우 표시 -->
      <div id="mentorCurrentBox" class="status-box" style="display:none;">
        <div class="status-row">
          <div class="k">현재 연결된 주소</div>
          <div class="v" id="mentorCurrentAddr" style="word-break:break-all; font-family:monospace; font-size:12px;">-</div>
        </div>
      </div>

      <div class="actions" style="margin-top:14px;">
        <button id="btnLinkMentor" class="btn primary" type="button">MetaMask 서명 후 등록</button>
      </div>
      <div id="mentorLinkMsg" class="hint" style="margin-top:8px; display:none;"></div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module" src="/assets/js/header-auth.js"></script>
  <script type="module" src="/assets/js/pages/family-register.js"></script>
</body>
</html>

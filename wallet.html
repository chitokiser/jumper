<!-- /wallet.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>지갑 관리 — Jump</title>
  <link rel="stylesheet" href="/assets/css/pages/buggy.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #fafaf9; min-height: 100dvh; }

    .wlt-header {
      position: sticky; top: 0; z-index: 10;
      background: #f59e0b; color: #fff;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(245,158,11,.25);
    }
    .wlt-header-back {
      background: none; border: none; color: #fff;
      font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1;
    }
    .wlt-header h1 { margin: 0; font-size: 1.05rem; font-weight: 800; }

    .wlt-body { padding: 16px; max-width: 480px; margin: 0 auto; }

    .wlt-card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .wlt-card-title {
      font-size: 0.78rem; font-weight: 700; color: #78716c;
      text-transform: uppercase; letter-spacing: .04em;
      margin: 0 0 14px;
    }

    .wlt-hex-balance {
      font-size: 1.5rem; font-weight: 900; color: #1c1917;
      margin-bottom: 4px;
    }
    .wlt-hex-sub {
      font-size: 0.82rem; color: #78716c; margin-bottom: 12px;
    }
    .wlt-address-row {
      display: flex; align-items: center; gap: 8px;
      background: #fafaf9; border-radius: 8px;
      padding: 10px 12px; border: 1px solid #e7e5e4;
    }
    .wlt-address-txt {
      flex: 1; font-size: 0.75rem; color: #57534e;
      font-family: monospace; word-break: break-all;
    }
    .wlt-copy-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; flex-shrink: 0; color: #78716c;
    }
    .wlt-copy-btn:active { color: #f59e0b; }

    .wlt-no-wallet {
      text-align: center; padding: 20px 0 10px;
      color: #78716c; font-size: 0.88rem;
    }
    .wlt-no-wallet .icon { font-size: 2rem; margin-bottom: 8px; }

    /* 이용내역 */
    .ride-item {
      border-bottom: 1px solid #f3f4f6;
      padding: 12px 0;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .ride-item:last-child { border-bottom: none; padding-bottom: 0; }
    .ride-item-left { flex: 1; min-width: 0; }
    .ride-date { font-size: 0.72rem; color: #a8a29e; margin-bottom: 2px; }
    .ride-pickup { font-size: 0.82rem; color: #1c1917; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ride-duration { font-size: 0.75rem; color: #78716c; margin-top: 2px; }
    .ride-item-right { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .ride-fare { font-size: 0.92rem; font-weight: 800; color: #1c1917; }
    .ride-pay-badge {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      padding: 2px 7px; border-radius: 20px; margin-top: 4px;
    }
    .ride-pay-badge.paid     { background: #dcfce7; color: #15803d; }
    .ride-pay-badge.partial  { background: #fef9c3; color: #a16207; }
    .ride-pay-badge.failed   { background: #fee2e2; color: #dc2626; }
    .ride-pay-badge.pending  { background: #f3f4f6; color: #6b7280; }

    .wlt-empty {
      text-align: center; padding: 28px 0;
      color: #a8a29e; font-size: 0.88rem;
    }
    .wlt-empty .icon { font-size: 2rem; margin-bottom: 8px; }

    .wlt-spinner {
      text-align: center; padding: 24px 0; color: #a8a29e; font-size: 0.85rem;
    }

    .wlt-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(40px);
      background: #1c1917; color: #fff; border-radius: 8px;
      padding: 8px 16px; font-size: 0.82rem; font-weight: 600;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .wlt-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header class="wlt-header">
  <button class="wlt-header-back" id="btnBack" aria-label="뒤로">&#8592;</button>
  <h1>💳 지갑 관리</h1>
</header>

<div class="wlt-body">

  <!-- HEX 잔액 -->
  <div class="wlt-card">
    <p class="wlt-card-title">HEX 잔액</p>
    <div id="walletSection">
      <div class="wlt-spinner">불러오는 중...</div>
    </div>
  </div>

  <!-- 버기카 이용내역 -->
  <div class="wlt-card">
    <p class="wlt-card-title">버기카 이용내역</p>
    <div id="rideHistorySection">
      <div class="wlt-spinner">불러오는 중...</div>
    </div>
  </div>

</div>

<div class="wlt-toast" id="wltToast"></div>

<script type="module">
import { getApps, initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getFirestore, collection, query, where, orderBy, limit, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
import { getFunctions, httpsCallable }
  from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-functions.js';
import { firebaseConfig } from '/assets/js/firebase-config.js';
import { watchAuth }      from '/assets/js/auth.js';

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db  = getFirestore(app);
const fns = getFunctions(app);
const fnGetOnChain = httpsCallable(fns, 'getMyOnChain');

// ── 뒤로가기 ────────────────────────────────────────────────────────────
document.getElementById('btnBack').addEventListener('click', () => {
  history.length > 1 ? history.back() : location.assign('/buggy.html');
});

// ── 토스트 ───────────────────────────────────────────────────────────────
const toastEl = document.getElementById('wltToast');
function toast(msg, ms = 2500) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), ms);
}

// ── 날짜 포맷 ────────────────────────────────────────────────────────────
function fmtDate(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fmtVnd(n) { return `₫${Number(n || 0).toLocaleString()}`; }

// ── 지갑 섹션 렌더 ───────────────────────────────────────────────────────
function renderWallet(data, walletAddr) {
  const sec = document.getElementById('walletSection');
  if (!walletAddr && !data) {
    sec.innerHTML = `<div class="wlt-no-wallet"><div class="icon">💳</div>연동된 HEX 지갑이 없습니다.<br>관리자에게 문의하세요.</div>`;
    return;
  }

  let balanceHtml = '';
  if (data?.walletHexWei && BigInt(data.walletHexWei) > 0n) {
    const vnd = data.walletHexVnd != null ? Number(data.walletHexVnd).toLocaleString() + ' VND' : null;
    const usd = data.walletHexUsd != null ? '$' + Number(data.walletHexUsd).toFixed(2) : null;
    const krw = data.walletHexKrw != null ? Number(data.walletHexKrw).toLocaleString() + '원' : null;
    const primary = vnd || usd || krw || data.walletHexDisplay || '0 HEX';
    const sub = [usd, krw].filter(Boolean).join(' / ');
    balanceHtml = `<div class="wlt-hex-balance">${primary}</div>`;
    if (sub) balanceHtml += `<div class="wlt-hex-sub">${sub}</div>`;
  } else {
    balanceHtml = `<div class="wlt-hex-balance">0 HEX</div>`;
  }

  const addr = walletAddr || data?.walletAddress || '';
  const addrHtml = addr
    ? `<div class="wlt-address-row">
        <span class="wlt-address-txt" id="addrTxt">${addr}</span>
        <button class="wlt-copy-btn" id="btnCopyAddr" title="복사">📋</button>
       </div>`
    : '';

  sec.innerHTML = balanceHtml + addrHtml;

  if (addr) {
    document.getElementById('btnCopyAddr').addEventListener('click', () => {
      navigator.clipboard.writeText(addr).then(() => toast('주소 복사됨')).catch(() => {
        const el = document.getElementById('addrTxt');
        const range = document.createRange();
        range.selectNodeContents(el);
        getSelection().removeAllRanges();
        getSelection().addRange(range);
      });
    });
  }
}

// ── 이용내역 섹션 렌더 ───────────────────────────────────────────────────
function renderRides(rides) {
  const sec = document.getElementById('rideHistorySection');
  if (!rides.length) {
    sec.innerHTML = `<div class="wlt-empty"><div class="icon">🚗</div>이용내역이 없습니다.</div>`;
    return;
  }

  const BADGE = {
    paid:    ['paid',    '결제 완료'],
    partial: ['partial', '부분 결제'],
    failed:  ['failed',  '결제 실패'],
    pending: ['pending', '미결제'],
  };

  const html = rides.map(r => {
    const [cls, label] = BADGE[r.paymentStatus] || BADGE.pending;
    const date = fmtDate(r.completedAt || r.createdAt);
    const pickup = r.pickupAddress || '위치 정보 없음';
    const duration = r.durationMinutes != null ? `${r.durationMinutes}분` : '-';
    const fare = r.feeVnd != null ? fmtVnd(r.feeVnd) : '-';
    return `
      <div class="ride-item">
        <div class="ride-item-left">
          <div class="ride-date">${date}</div>
          <div class="ride-pickup">${pickup}</div>
          <div class="ride-duration">탑승 ${duration}</div>
        </div>
        <div class="ride-item-right">
          <div class="ride-fare">${fare}</div>
          <span class="ride-pay-badge ${cls}">${label}</span>
        </div>
      </div>`;
  }).join('');

  sec.innerHTML = html;
}

// ── 메인: watchAuth ───────────────────────────────────────────────────────
watchAuth(async ({ loggedIn, profile }) => {
  if (!loggedIn) {
    location.assign('/buggy.html');
    return;
  }

  const uid = profile.uid;

  // 지갑 정보 로드
  try {
    const res = await fnGetOnChain();
    const d = res.data;
    const addr = d?.walletAddress || profile.walletAddress || null;
    renderWallet(d, addr);
  } catch (_) {
    renderWallet(null, profile.walletAddress || null);
  }

  // 이용내역 로드 (완료된 라이드만, 최근 30건)
  try {
    const q = query(
      collection(db, 'buggy_rides'),
      where('userId', '==', uid),
      where('status', '==', 'completed'),
      orderBy('completedAt', 'desc'),
      limit(30)
    );
    const snap = await getDocs(q);
    renderRides(snap.docs.map(d => d.data()));
  } catch (_) {
    // completedAt 인덱스 없을 경우 createdAt으로 폴백
    try {
      const q2 = query(
        collection(db, 'buggy_rides'),
        where('userId', '==', uid),
        where('status', '==', 'completed'),
        orderBy('createdAt', 'desc'),
        limit(30)
      );
      const snap2 = await getDocs(q2);
      renderRides(snap2.docs.map(d => d.data()));
    } catch (e2) {
      document.getElementById('rideHistorySection').innerHTML =
        `<div class="wlt-empty"><div class="icon">⚠️</div>내역을 불러올 수 없습니다.</div>`;
    }
  }
});
</script>
</body>
</html>

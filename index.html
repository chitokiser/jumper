<body>
  <div id="siteHeader"></div>

  <!-- HERO VIDEO – 전체 너비 (page 박스 밖) -->
  <section class="town-hero hero-video" id="heroSection">
    <!-- 비디오 배경 -->
    <div class="hero-bg" aria-hidden="true">
      <video
        class="hero-video-el"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
      >
        <source src="/assets/images/mpeg/banner.mp4" type="video/mp4">
      </video>
      <div class="hero-bg-vignette"></div>
    </div>

    <!-- 내용 -->
    <div class="town-hero-inner hero-content">
      <h1 class="town-title">당신의 다음 한 달은 하노이입니다</h1>
      <p class="town-desc">
        공간의 제약을 넘어<br/>
        새로운 일상이 시작되는 곳<br/>
        점퍼와 함께하는 하노이 한 달 살기
      </p>
      <div class="hero-actions"></div>
    </div>
  </section>

  <main class="page">

  <style>
  .merchant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:4px;}
  .merchant-card{background:var(--surface,#fff);border:1px solid var(--border,#e5e7eb);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:6px;}
  .merchant-card-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .merchant-name{font-weight:700;font-size:1rem;color:var(--text,#111);}
  .merchant-career{font-size:0.78rem;background:var(--accent-light,#ede9fe);color:var(--accent,#7c3aed);border-radius:99px;padding:2px 9px;}
  .merchant-region{font-size:0.82rem;color:var(--muted,#6b7280);}
  .merchant-desc{font-size:0.83rem;color:var(--text2,#374151);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .merchant-id{font-size:0.74rem;color:var(--muted,#9ca3af);margin-top:auto;}
</style>

<section class="section" id="merchantListSection">
  <div class="section-h">
    <h2 class="section-title">가맹점 리스트</h2>
    <div class="section-tools">
      <a class="btn btn--primary" href="/family-register.html">가맹점 등록</a>
    </div>
  </div>
  <div id="merchantListState" class="help small" style="margin:4px 0 10px;"></div>
  <div id="merchantListGrid" class="merchant-grid"></div>
</section>

      </a>
         <a class="photo-tile" href="/homestay.html">
        <img loading="lazy" src="/assets/images/homestay/5.png" alt="홈스테이">
      </a>
      <a class="photo-tile" href="/homestay.html">

    <!-- 우리마을 놀거리 카드 섹션 -->
 <section class="section" id="home-what-photos">
  <div class="section-h">
    <h2 class="section-title">우리마을 놀거리</h2>
  </div>

  <div class="panel photo-grid-panel">
    <div class="photo-grid">
      <a class="photo-tile" href="/what.html">
        <img loading="lazy" src="/assets/images/what/1.png" alt="놀거리">
      </a>
      <a class="photo-tile" href="/what.html">

    <section class="section" id="village-map">
      <div class="section-h">
        <h2 class="section-title">우리마을 지도</h2>
      </div>

      <div class="panel map-panel">
        <div class="map-panel-inner">

          <div class="map-copy">
            <p class="map-title">우리마을 지도에 홈스테이, 식당, 병원, 놀거리를 표시합니다.</p>
            <p class="map-desc">
              실제로 존재하는 장소만 등록되며, Jovial은 큐레이션된 콘텐츠만 연결합니다.
            </p>

            <div class="map-actions">
              <a class="btn btn--ghost btn--sm"
                 id="btnAdminPlace"
                 href="/admin_places.html"
                 style="display:none;">
                장소 등록 (관리자)
              </a>
            </div>
          </div>

          <div class="map-box" aria-hidden="false">
            <div id="villageMap" style="width:100%;height:480px;border-radius:8px;background:#f3f4f6;"></div>
          </div>

        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-h">
        <h2 class="section-title">우리마을 사진관</h2>
      </div>
      <div class="panel photo-panel">
        <div class="photo-slider" id="uiSlider" aria-label="우리마을 사진관">
          <button class="ps-btn" type="button" id="uiPrev" aria-label="이전 사진">‹</button>
          <div class="ps-stage">
            <img id="uiSlideImg" loading="lazy" class="ps-img" alt="우리마을 사진" />
            <div class="ps-meta">
              <span id="uiSlideIndex" class="ps-index">-</span>
            </div>
          </div>
          <button class="ps-btn" type="button" id="uiNext" aria-label="다음 사진">›</button>
        </div>
        <div class="help small" id="uiSlideHelp" style="margin-top:10px;"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-h">
        <h2 class="section-title">공지사항</h2>
      </div>

          <a href="/admin_notices.html" id="noticeAdminLink" style="display:none;">공지 관리</a>

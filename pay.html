<!-- /pay.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>결제 확인 | Jovial Travel</title>

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />

  <script src="/assets/js/partials.js" defer></script>
  <script type="module" src="/assets/js/firebase-init.js"></script>
  <script type="module" src="/assets/js/header-auth.js"></script>

  <style>
    .pay-card {
      background: var(--surface, #f9fafb);
      border: 2px solid var(--accent, #7c3aed);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 400px;
      margin: 0 auto 20px;
      text-align: center;
    }
    .pay-merchant {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pay-amount {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent, #7c3aed);
      margin: 8px 0 4px;
    }
    .pay-amount-sub {
      font-size: 0.85rem;
      color: var(--muted, #6b7280);
    }
    .btn-pay {
      width: 100%;
      font-size: 1.1rem;
      padding: 14px;
      margin-top: 20px;
      border-radius: 12px;
    }
    .pay-result {
      max-width: 400px;
      margin: 0 auto;
    }
    .pay-result .mp-kv {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border, #e5e7eb);
      font-size: 0.9rem;
    }
    .pay-result .mp-kv:last-child { border-bottom: none; }
    .pay-result .k { color: var(--muted, #6b7280); }
    .pay-result .v { font-weight: 600; word-break: break-all; text-align: right; max-width: 70%; }
    .jp-box { margin-top: 20px; border-radius: 14px; overflow: hidden; }
    .jp-waiting { text-align: center; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 0.88rem; color: #64748b; }
    .jp-win { text-align: center; padding: 22px 16px; background: linear-gradient(135deg, #1e1b4b, #312e81); border-radius: 14px; color: #fff; }
    .jp-win-emoji { font-size: 2.4rem; margin-bottom: 6px; }
    .jp-win-title { font-size: 1rem; font-weight: 800; color: #fde68a; letter-spacing: .06em; margin-bottom: 6px; }
    .jp-win-amount { font-size: 2rem; font-weight: 900; color: #fef08a; text-shadow: 0 2px 16px rgba(250,204,21,.4); }
    .jp-win-hint { font-size: 0.75rem; color: #cbd5e1; margin-top: 8px; }
    .jp-nowin { text-align: center; padding: 14px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; }
    .jp-nowin-title { font-size: 0.88rem; color: #475569; }
    .jp-nowin-rand { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    /* 슬롯머신 애니메이션 */
    .jp-slot-wrap{text-align:center;padding:20px 16px;background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:14px;}
    .jp-slot-header{font-size:0.88rem;color:#c4b5fd;font-weight:700;letter-spacing:.06em;margin-bottom:12px;}
    .jp-drum-box{display:inline-flex;align-items:center;justify-content:center;background:#0a0818;border:2px solid #7c3aed;border-radius:12px;padding:14px 28px;box-shadow:0 0 24px rgba(124,58,237,.5),inset 0 0 12px rgba(0,0,0,.4);margin:4px 0 10px;}
    .jp-drum-reel{overflow:hidden;}
    .jp-drum-num{font-size:2.6rem;font-weight:900;color:#fef08a;font-family:monospace;letter-spacing:.25em;text-shadow:0 0 18px rgba(254,240,138,.7);display:block;}
    .jp-drum-num.jp-drum-land{animation:jpLand .6s cubic-bezier(.17,.67,.35,1.3);}
    @keyframes jpLand{0%{transform:scale(1.5);color:#fff;text-shadow:0 0 40px #fff,0 0 80px #a78bfa;}60%{transform:scale(0.95);}100%{transform:scale(1);color:#fef08a;}}
    .jp-slot-sub{font-size:0.76rem;color:#a5b4fc;margin-top:4px;}
    .jp-slot-bar{background:rgba(255,255,255,.1);border-radius:4px;height:4px;margin-top:10px;overflow:hidden;}
    .jp-slot-bar-inner{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:4px;width:0%;transition:width .15s ease;}
    /* 당첨 등장 애니메이션 */
    .jp-win{animation:jpWinReveal .7s cubic-bezier(.17,.67,.35,1.2);}
    @keyframes jpWinReveal{0%{transform:scale(.7) translateY(20px);opacity:0;}70%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}
    .jp-win-emoji{animation:jpEmoji 1s ease-in-out infinite alternate;}
    @keyframes jpEmoji{0%{transform:scale(1) rotate(-5deg);}100%{transform:scale(1.15) rotate(5deg);}}
    /* 꽝 등장 */
    .jp-nowin{animation:jpNoWinReveal .5s ease-out;}
    @keyframes jpNoWinReveal{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:none;}}
  </style>
</head>

<body>
  <div id="siteHeader"></div>

  <main class="page">
    <section class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">결제 확인</h1>
        <p class="hero-desc" id="payHeroDesc">가맹점 QR 결제</p>
      </div>
    </section>

    <section class="panel" style="max-width:480px; margin:0 auto;">
      <div class="panel-body">

        <!-- 잘못된 링크 -->
        <div id="invalidPanel" style="display:none;">
          <p class="hint" style="color:var(--danger,#e53e3e);">잘못된 결제 링크입니다.</p>
          <a class="btn btn--ghost" href="/index.html">홈으로</a>
        </div>

        <!-- 비로그인 -->
        <div id="needLoginPanel" style="display:none;">
          <div class="pay-card">
            <div class="pay-merchant" id="payMerchantNameLogin">-</div>
            <div class="pay-amount" id="payAmountLogin">-</div>
            <div class="pay-amount-sub">결제하려면 로그인이 필요합니다.</div>
          </div>
          <button class="btn btn-pay" id="btnLogin" type="button">구글 로그인 후 결제</button>
        </div>

        <!-- 미등록 회원 -->
        <div id="needRegisterPanel" style="display:none;">
          <div class="pay-card">
            <div class="pay-merchant" id="payMerchantNameReg">-</div>
            <div class="pay-amount" id="payAmountReg">-</div>
            <div class="pay-amount-sub">결제하려면 회원가입이 필요합니다.</div>
          </div>
          <a class="btn btn-pay" href="/register.html">회원가입 하기 →</a>
        </div>

        <!-- 결제 패널 -->
        <div id="payPanel" style="display:none;">
          <div class="pay-card">
            <div class="pay-merchant" id="payMerchantName">-</div>
            <div class="pay-amount" id="payAmountDisp">-</div>
            <div class="pay-amount-sub">수탁 지갑 HEX로 결제됩니다.</div>
          </div>

          <button class="btn btn-pay" id="btnPay" type="button">결제하기</button>

          <!-- 처리 중 -->
          <p class="hint" id="payState" style="text-align:center; margin-top:12px; display:none;"></p>
        </div>

        <!-- 결제 완료 -->
        <div id="donePanel" style="display:none;">
          <p style="text-align:center; font-size:1.5rem; margin-bottom:16px;">✅</p>
          <p style="text-align:center; font-weight:700; font-size:1.1rem; margin-bottom:20px; color:var(--accent,#7c3aed);">결제 완료!</p>
          <div class="pay-result" id="payResult"></div>

          <!-- 잭팟 결과 -->
          <div id="jackpotResultBox" class="jp-box" style="display:none;">
            <div id="jpWaiting" class="jp-waiting">🎰 잭팟 결과 확인 중...</div>
            <div id="jpWin" class="jp-win" style="display:none;">
              <div class="jp-win-emoji">🎉</div>
              <div class="jp-win-title">잭팟 당첨!</div>
              <div id="jpWinAmount" class="jp-win-amount">0 HEX</div>
              <div class="jp-win-hint">마이페이지에서 출금 신청하세요</div>
            </div>
            <div id="jpNoWin" class="jp-nowin" style="display:none;">
              <div class="jp-nowin-title">🎰 잭팟에 참여했습니다 — 이번엔 아쉽네요!</div>
              <div id="jpNoWinRand" class="jp-nowin-rand"></div>
            </div>
          </div>

          <a class="btn btn--ghost" href="/index.html" style="display:block; text-align:center; margin-top:20px;">홈으로</a>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module" src="/assets/js/pages/pay.js"></script>
</body>
</html>
